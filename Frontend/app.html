<!DOCTYPE html>
<html>
<head>
  <title>AI Code Review Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🤖 AI Review</h2>

  <button onclick="showTab('analyze')" id="analyzeBtn" class="active">
    🧠 Analyze
  </button>

  <button onclick="showTab('dashboard')" id="dashboardBtn">
    📊 Dashboard
  </button>

  <button onclick="logout()">🚪 Logout</button>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">AI Code Review Dashboard</div>

  <!-- ANALYZE -->
  <div id="analyzeTab" class="card">
    <h3>Analyze Your Code</h3>

    <!-- FILE UPLOAD -->
    <input type="file" id="fileInput" accept=".js,.txt">
    <button onclick="uploadFile()">Upload & Analyze</button>

    <br><br>

    <!-- TEXT INPUT -->
    <textarea id="code" placeholder="Or paste your code here..."></textarea>

    <button onclick="analyze()">Analyze Code</button>

    <div id="result"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardTab" class="card" style="display:none;">
    <h3>Analysis History</h3>

    <button onclick="loadDashboard()">Refresh</button>

    <div id="dashboard"></div>
  </div>

</div>

<script>

// 🔒 PROTECT PAGE
if (!localStorage.getItem("loggedIn")) {
  window.location = "index.html";
}

// 🔁 SWITCH TABS
function showTab(tab) {
  document.getElementById("analyzeTab").style.display =
    tab === "analyze" ? "block" : "none";

  document.getElementById("dashboardTab").style.display =
    tab === "dashboard" ? "block" : "none";

  document.getElementById("analyzeBtn").classList.remove("active");
  document.getElementById("dashboardBtn").classList.remove("active");

  document.getElementById(tab + "Btn").classList.add("active");
}

// 🚪 LOGOUT
function logout() {
  localStorage.clear();
  window.location = "index.html";
}

// 🎨 COLOR HELPER
function getColor(severity) {
  if (severity === "High") return "#ef4444";
  if (severity === "Medium") return "#f59e0b";
  return "#22c55e";
}

// 🔍 ANALYZE TEXT
async function analyze() {
  const code = document.getElementById("code").value;

  const res = await fetch("http://localhost:5000/api/analyze", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ code, userId: "123" })
  });

  const data = await res.json();
  displayResult(data);
}

// 📁 FILE ANALYZE
async function uploadFile() {

  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Please select a file");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function(e) {

    const code = e.target.result;

    // ✅ STEP 1 — Put code into textarea
    document.getElementById("code").value = code;

    // ✅ STEP 2 — Send to backend
    const res = await fetch("http://localhost:5000/api/analyze", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ code, userId: "123" })
    });

    const data = await res.json();

    displayResult(data, file.name);
  };

  reader.readAsText(file);
}

// 🎯 DISPLAY RESULT (NEW STRUCTURE)
function displayResult(data, fileName = null) {

  const issues = data.result?.issues || [];

  let output = `<h3>Analysis Result</h3>`;

  if (fileName) {
    output += `<p><b>File:</b> ${fileName}</p>`;
  }

  issues.forEach(issue => {
    output += `
      <div style="
        border-left:5px solid ${getColor(issue.severity)};
        padding:10px;
        margin-bottom:10px;
        background:#1e293b;
        border-radius:6px;
      ">
        <b>${issue.type}</b> (${issue.severity})<br>
        ${issue.message}<br>
        <i>👉 ${issue.suggestion || ""}</i>
      </div>
    `;
  });

  document.getElementById("result").innerHTML = output;
}

// 📄 DOWNLOAD FUNCTION (GLOBAL)
function downloadReport(id) {
  window.open(`http://localhost:5000/api/analyze/report/${id}`, "_blank");
}

// 📊 DASHBOARD
async function loadDashboard() {

  const res = await fetch("http://localhost:5000/api/analyze/history/123");
  const data = await res.json();

  let output = `<h3>Total Analyses: ${data.length}</h3>`;

  data.forEach((item, index) => {

    let issuesHTML = item.result.issues.map(issue => `
      <div style="
        border-left:5px solid ${getColor(issue.severity)};
        padding:8px;
        margin:5px 0;
        background:#020617;
        border-radius:6px;
      ">
        <b>${issue.type}</b> (${issue.severity})<br>
        ${issue.message}<br>
        <i>👉 ${issue.suggestion || ""}</i>
      </div>
    `).join("");

    output += `
      <div style="
        margin-bottom:20px;
        padding:15px;
        background:#1e293b;
        border-radius:10px;
      ">
        <b>Analysis ${index + 1}</b><br><br>

        <pre>${item.code}</pre>

        ${issuesHTML}

        <button onclick="downloadReport('${item._id}')">
          📄 Download Report
        </button>
      </div>
    `;
  });

  document.getElementById("dashboard").innerHTML = output;
}

</script>
</body>
</html>
